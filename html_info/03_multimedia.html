<!DOCTYPE html>
<html lang="ca">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia</title>
</head>


<body> <!--Titol / Inici de pàgina-->
    <h1>Multimedia</h1>
    <p>Aquest és un exemple de pàgina web amb contingut multimèdia.</p> 


    <!--Incrustació d'imatges-->
    <h2>Imatge 1</h2>
    <image src="multimedia/1920_eka350-hires.jpg" alt="Exemple d'imatge" width="300">

    <h2>Imatge 2</h2>
    <image src="multimedia/533945_5c1f6.gif" width="300" height="200" alt="Exemple d'imatge">
    <br>


    <!--Incrustació de vídeo-->
    <h2>Vídeo</h2>
    <video width="320" height="240" controls>
    <source src="https://www.pexels.com/ca-es/download/video/32949185/" type="video/mp4">
    </video>
    <br>
    <!--Incrustació video de YT-->
    <h2>Vídeo de YouTube</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/RhPTHcVVtzA?si=EendvM_Fdq6-ehTe" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    
    <br>

    <!--Incrustació d'audio-->
    <h2>Àudio</h2>
    <audio controls>
    <source src="multimedia/audio.mp3"> controls>
    </audio>

    <!--Incrustació de mapa - google maps-->
    <h2>Mapa - Google Maps</h2>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2984.6710361878872!2d1.9965257751632188!3d41.57636378425345!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x12a492b1b7d3bdbd%3A0xe1ed23437291099b!2sIES%20Torre%20del%20Palau!5e0!3m2!1ses!2ses!4v1777277286216!5m2!1ses!2ses" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>


</body> <!--Tancament de pàgina/Final-->
</html>
